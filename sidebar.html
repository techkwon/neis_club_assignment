<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나이스 동아리 배정 도우미</title>
    <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="icon48.png" alt="Logo">
            </div>
            <h1>동아리 배정 자동화</h1>
        </header>

        <!-- 페이지 상태 감지 배너 -->
        <div id="pageStatusBanner" class="banner banner-warning">
            <span id="pageStatusIcon">⚠️</span>
            <span id="pageStatusText">페이지 확인 중...</span>
        </div>

        <main>
            <div class="card info-card">
                <p>나이스 <strong>창의적 체험활동 → 동아리활동관리 → 부서배정</strong> 화면에서 작동합니다.</p>
                <button id="btnDownloadTemplate" class="btn secondary">⬇️ CSV 템플릿 양식 받기</button>
            </div>

            <div class="card upload-card">
                <div class="upload-header">
                    <h3>📁 데이터 업로드 (CSV)</h3>
                    <button id="btnResetFile" class="btn-icon" title="초기화" style="display:none;">🔄</button>
                </div>
                <div class="file-input-wrapper">
                    <input type="file" id="csvFileInput" accept=".csv" />
                    <label for="csvFileInput" class="file-label">
                        <span id="fileChosenText">파일을 선택하거나 드래그하세요</span>
                    </label>
                </div>
                <!-- 정렬 옵션 -->
                <div class="sort-option">
                    <label class="toggle-label" for="toggleSort">
                        <span>📊 학년·반·번호 순 자동정렬</span>
                        <span class="toggle-hint">학년/반 변경 횟수를 최소화합니다</span>
                    </label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggleSort" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <!-- 절전 방지 옵션 -->
                <div class="sort-option">
                    <label class="toggle-label" for="toggleWakeLock">
                        <span>🔋 화면 꺼짐 방지</span>
                        <span class="toggle-hint">작업 중 절전모드 진입을 막습니다</span>
                    </label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggleWakeLock" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="card status-card">
                <h3>⚙️ 작업 상태</h3>
                <div id="statusMessage" class="status-indicator">대기 중...</div>
                
                <div class="progress-info">
                    <span id="progressText">0 / 0 명</span>
                </div>
                <!-- 프로그레스 바 -->
                <div class="progress-bar-wrapper">
                    <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                </div>
                <!-- Action buttons -->
                <div class="btn-group">
                    <button id="btnStartAutoAssign" class="btn primary" disabled>🚀 배정 시작</button>
                    <button id="btnPauseResume" class="btn secondary" style="display:none;">⏸ 일시정지</button>
                    <button id="btnStop" class="btn danger" style="display:none;">⏹ 정지</button>
                </div>
            </div>

            <!-- 작업 결과 요약 (완료/중지 시 표시) -->
            <div id="summaryCard" class="card summary-card" style="display:none;">
                <h3>📊 작업 결과</h3>
                <div class="summary-stats">
                    <div class="stat stat-success">
                        <span class="stat-num" id="statSuccess">0</span>
                        <span class="stat-label">성공</span>
                    </div>
                    <div class="stat stat-fail">
                        <span class="stat-num" id="statFail">0</span>
                        <span class="stat-label">실패</span>
                    </div>
                    <div class="stat stat-pending">
                        <span class="stat-num" id="statPending">0</span>
                        <span class="stat-label">대기</span>
                    </div>
                    <div class="stat stat-number">
                        <span class="stat-num" id="statByNumber">0</span>
                        <span class="stat-label">번호매칭</span>
                    </div>
                </div>
                <!-- 실패 목록 -->
                <div id="failedListWrapper" style="display:none;">
                    <h4>❌ 실패 항목</h4>
                    <div id="failedList" class="failed-list"></div>
                </div>
                <!-- 번호 매칭 목록 -->
                <div id="numberMatchWrapper" style="display:none;">
                    <h4>🔢 번호로 매칭된 학생</h4>
                    <div id="numberMatchList" class="failed-list"></div>
                </div>
            </div>

            <!-- 활동 로그 -->
            <div class="card log-card">
                <div class="log-header">
                    <h3>📋 배정 로그</h3>
                    <button id="btnClearLog" class="btn-icon" title="로그 지우기">🗑️</button>
                </div>
                <div id="logContainer" class="log-container">
                    <div class="log-empty">배정을 시작하면 여기에 결과가 표시됩니다.</div>
                </div>
            </div>
        </main>
        
        <footer>
            <small>🔒 모든 데이터는 브라우저 내부에서만 안전하게 처리됩니다.</small>
        </footer>
    </div>
    
    <script src="papaparse.min.js"></script>
    <script src="sidebar.js"></script>
</body>
</html>
